<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaFood • Checkout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            padding-bottom: 40px;
        }
        
        .header {
            background: white;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #e9ecef;
        }
        
        .header-content {
            display: flex;
            align-items: center;
            gap: 16px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .back-btn {
            width: 36px;
            height: 36px;
            background: #f1f5f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .header-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1a1a2e;
        }
        
        .checkout-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .form-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 6px;
        }
        
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.9rem;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .payment-methods {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .payment-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .payment-option:hover {
            border-color: #667eea;
            background: #f8f9fa;
        }
        
        .payment-option.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }
        
        .payment-icon {
            width: 36px;
            height: 36px;
            background: #f1f5f9;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        
        .payment-name {
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .payment-desc {
            font-size: 0.65rem;
            color: #64748b;
        }
        
        .order-summary {
            background: white;
            border-radius: 20px;
            padding: 20px;
        }
        
        .order-items {
            margin-bottom: 16px;
            max-height: 250px;
            overflow-y: auto;
        }
        
        .order-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            padding: 8px 0;
            border-bottom: 1px solid #e9ecef;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }
        
        .summary-row.total {
            border-top: 1px solid #e9ecef;
            padding-top: 12px;
            margin-top: 8px;
            font-weight: 700;
            font-size: 1rem;
        }
        
        .confirm-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.8rem;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="back-btn" onclick="history.back()">
                <i class="fas fa-arrow-left"></i>
            </div>
            <div class="header-title">💳 Checkout</div>
        </div>
    </div>
    
    <div class="checkout-container" id="checkoutContainer">
        <div class="form-section">
            <div class="section-title">
                <i class="fas fa-user" style="color:#667eea;"></i> Delivery Information
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" class="form-control" id="customerName" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" class="form-control" id="customerPhone" placeholder="Enter phone number">
            </div>
            <div class="form-group">
                <label>Table Number (Optional)</label>
                <input type="text" class="form-control" id="tableNumber" placeholder="Enter table number">
            </div>
            <div class="form-group">
                <label>Notes (Optional)</label>
                <textarea class="form-control" id="orderNotes" rows="2" placeholder="Any special requests?"></textarea>
            </div>
        </div>
        
        <div class="form-section">
            <div class="section-title">
                <i class="fas fa-credit-card" style="color:#667eea;"></i> Payment Method
            </div>
            <div class="payment-methods" id="paymentMethods">
                <div class="payment-option selected" data-method="cash">
                    <div class="payment-icon"><i class="fas fa-money-bill"></i></div>
                    <div>
                        <div class="payment-name">Cash</div>
                        <div class="payment-desc">Pay at counter</div>
                    </div>
                </div>
                <div class="payment-option" data-method="qris">
                    <div class="payment-icon"><i class="fas fa-qrcode"></i></div>
                    <div>
                        <div class="payment-name">QRIS</div>
                        <div class="payment-desc">Scan with any e-wallet</div>
                    </div>
                </div>
                <div class="payment-option" data-method="card">
                    <div class="payment-icon"><i class="fas fa-credit-card"></i></div>
                    <div>
                        <div class="payment-name">Credit / Debit Card</div>
                        <div class="payment-desc">Visa, Mastercard</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="order-summary" id="orderSummary">
            <div class="section-title">Order Summary</div>
            <div class="order-items" id="orderItems"></div>
            <div class="summary-row" id="subtotalRow">
                <span>Subtotal</span>
                <span id="subtotalValue">Rp 0</span>
            </div>
            <div class="summary-row">
                <span>Delivery Fee</span>
                <span id="deliveryFeeValue">Rp 0</span>
            </div>
            <div class="summary-row">
                <span>Tax (0%)</span>
                <span id="taxValue">Rp 0</span>
            </div>
            <div class="summary-row total">
                <span>Total</span>
                <span id="totalValue">Rp 0</span>
            </div>
            <button class="confirm-btn" id="confirmBtn">Confirm Order</button>
        </div>
    </div>
    
    <script type="module">
        import { db, collection, addDoc } from './js/firebase-config.js';
        
        let cart = [];
        let currentStand = null;
        let selectedPayment = 'cash';
        
        function formatRupiah(price) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(price);
        }
        
        function loadData() {
            cart = JSON.parse(localStorage.getItem('cart') || '[]');
            currentStand = JSON.parse(localStorage.getItem('currentStand') || 'null');
            
            if (cart.length === 0) {
                window.location.href = 'index.html';
            }
            
            renderOrderSummary();
            
            // Load current user data if available
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                const user = JSON.parse(currentUser);
                document.getElementById('customerName').value = user.name || '';
            }
        }
        
        function renderOrderSummary() {
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const deliveryFee = 0;
            const tax = Math.round(subtotal * 0);
            const total = subtotal + deliveryFee + tax;
            
            const orderItemsDiv = document.getElementById('orderItems');
            orderItemsDiv.innerHTML = cart.map(item => `
                <div class="order-item">
                    <span>${item.quantity}x ${item.name}</span>
                    <span>${formatRupiah(item.price * item.quantity)}</span>
                </div>
            `).join('');
            
            document.getElementById('subtotalValue').textContent = formatRupiah(subtotal);
            document.getElementById('taxValue').textContent = formatRupiah(tax);
            document.getElementById('totalValue').textContent = formatRupiah(total);
        }
        
        // Payment method selection
        document.querySelectorAll('.payment-option').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                selectedPayment = this.dataset.method;
            });
        });
        
        function generateOrderNumber() {
            return 'ORD-' + Date.now().toString().slice(-8);
        }
        
        function generateQueueNumber() {
            return Math.floor(Math.random() * 50) + 1;
        }
        
        async function saveOrderToFirebase(orderData) {
            try {
                const ordersRef = collection(db, "orders");
                const docRef = await addDoc(ordersRef, {
                    ...orderData,
                    createdAt: new Date().toISOString(),
                    status: 'pending'
                });
                return docRef.id;
            } catch (error) {
                console.error("Error saving order:", error);
                return null;
            }
        }
        
        async function confirmOrder() {
            const customerName = document.getElementById('customerName').value;
            const customerPhone = document.getElementById('customerPhone').value;
            
            if (!customerName || !customerPhone) {
                alert('Please fill in your name and phone number');
                return;
            }
            
            const confirmBtn = document.getElementById('confirmBtn');
            confirmBtn.innerHTML = '<span class="spinner"></span> Processing...';
            confirmBtn.disabled = true;
            
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const deliveryFee = 0;
            const tax = Math.round(subtotal * 0);
            const total = subtotal + deliveryFee + tax;
            const estimatedTime = Math.floor(Math.random() * 20) + 15;
            const queueNumber = generateQueueNumber();
            const orderNumber = generateOrderNumber();
            
            const orderData = {
                orderNumber: orderNumber,
                queueNumber: queueNumber,
                customerName: customerName,
                customerPhone: customerPhone,
                tableNumber: document.getElementById('tableNumber').value || '-',
                notes: document.getElementById('orderNotes').value,
                standId: currentStand?.id || null,
                standName: currentStand?.name || 'Unknown',
                items: cart.map(item => ({
                    id: item.id,
                    name: item.name,
                    price: item.price,
                    quantity: item.quantity,
                    subtotal: item.price * item.quantity
                })),
                subtotal: subtotal,
                deliveryFee: deliveryFee,
                tax: tax,
                total: total,
                paymentMethod: selectedPayment,
                estimatedTime: estimatedTime
            };
            
            // Save to Firebase
            const orderId = await saveOrderToFirebase(orderData);
            
            if (orderId) {
                // Save to localStorage as well
                let orders = JSON.parse(localStorage.getItem('orders') || '[]');
                orders.push({ ...orderData, id: orderId });
                localStorage.setItem('orders', JSON.stringify(orders));
                localStorage.setItem('currentOrder', JSON.stringify({ ...orderData, id: orderId }));
                
                // Clear cart
                localStorage.removeItem('cart');
                localStorage.removeItem('currentStand');
                
                showToast('Order placed successfully!');
                
                setTimeout(() => {
                    window.location.href = 'status-pesanan.html';
                }, 1500);
            } else {
                alert('Failed to place order. Please try again.');
                confirmBtn.innerHTML = 'Confirm Order';
                confirmBtn.disabled = false;
            }
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        document.getElementById('confirmBtn').addEventListener('click', confirmOrder);
        
        loadData();
    </script>
</body>
</html>
