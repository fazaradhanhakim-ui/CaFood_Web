<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CaFood Marketplace | Purple • Food Stalls</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f0ff;
            color: #1e1a3a;
            overflow-x: auto;
        }

        .marketplace-full {
            width: 100%;
            min-height: 100vh;
            padding: 28px 40px 60px 40px;
            background: #f5f0ff;
        }

        .hero-full {
            background: linear-gradient(125deg, #6d28d9 0%, #a855f7 100%);
            border-radius: 36px;
            padding: 48px 56px;
            margin-bottom: 48px;
            color: white;
            box-shadow: 0 20px 35px -10px rgba(109, 40, 217, 0.3);
            width: 100%;
        }

        .brand-chip {
            font-size: 14px;
            font-weight: 700;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 18px;
            border-radius: 60px;
            margin-bottom: 24px;
        }

        .hero-full h1 {
            font-size: 52px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 16px;
        }

        .hero-full p {
            font-size: 18px;
            opacity: 0.92;
            max-width: 580px;
            margin-bottom: 32px;
        }

        .search-row {
            max-width: 620px;
            display: flex;
            background: white;
            border-radius: 100px;
            align-items: center;
            justify-content: space-between;
            padding: 6px 6px 6px 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
        }

        .search-row i {
            color: #a855f7;
            font-size: 20px;
        }

        .search-row input {
            flex: 1;
            border: none;
            padding: 16px 14px;
            font-size: 16px;
            font-weight: 500;
            background: transparent;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .search-purple-btn {
            background: #7c3aed;
            border: none;
            padding: 10px 32px;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .category-section {
            margin-bottom: 48px;
        }

        .section-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .section-head h2 {
            font-size: 26px;
            font-weight: 800;
            color: #2d1b69;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .category-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }

        .cat-item {
            background: white;
            border-radius: 60px;
            padding: 10px 30px;
            font-weight: 700;
            font-size: 15px;
            color: #4c3b7c;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e2d9ff;
        }

        .cat-item.active {
            background: #7c3aed;
            color: white;
            border-color: #7c3aed;
            box-shadow: 0 8px 18px rgba(124, 58, 237, 0.2);
        }

        .stands-landscape-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 32px;
            margin-top: 12px;
            width: 100%;
        }

        .stand-card {
            background: #ffffff;
            border-radius: 32px;
            overflow: hidden;
            transition: all 0.25s ease;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.05);
            border: 1px solid #ede9fe;
            display: flex;
            flex-direction: column;
        }

        .stand-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 35px -14px rgba(109, 40, 217, 0.25);
            border-color: #c4b5fd;
        }

        .stand-img {
            width: 100%;
            height: 210px;
            object-fit: cover;
            background: #ddd6fe;
            display: block;
        }

        .stand-content {
            padding: 20px 22px 24px 22px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .stand-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .stand-name {
            font-size: 22px;
            font-weight: 800;
            color: #211752;
            letter-spacing: -0.2px;
        }

        .rating {
            background: #f5f3ff;
            padding: 5px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 13px;
            color: #6d28d9;
        }

        .desc {
            color: #52525b;
            font-size: 14px;
            line-height: 1.45;
            margin: 10px 0 12px 0;
        }

        .info-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            font-size: 13px;
            color: #5b4b8c;
            margin-bottom: 16px;
        }

        .menu-preview {
            margin: 18px 0 20px 0;
            border-top: 1px solid #f0eaff;
            padding-top: 16px;
        }

        .menu-label {
            font-weight: 800;
            font-size: 14px;
            color: #3b2b6b;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .menu-list-compact {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .menu-item-row:hover {
            background: #f3efff;
            transform: translateX(5px);
        }

        .menu-name {
            color: #1f1a3a;
        }

        .menu-price {
            font-weight: 800;
            color: #7c3aed;
        }

        .btn-order {
            background: #f3efff;
            border: none;
            padding: 12px 0;
            border-radius: 60px;
            font-weight: 800;
            font-size: 15px;
            color: #6d28d9;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .btn-order:hover {
            background: #7c3aed;
            color: white;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 70px 20px;
            background: #faf8ff;
            border-radius: 48px;
            color: #6b5b9e;
        }

        .footer {
            margin-top: 70px;
            text-align: center;
            color: #7b6cb0;
            border-top: 1px solid #e2d9ff;
            padding-top: 32px;
            font-weight: 500;
        }

        @media (max-width: 1100px) {
            .marketplace-full { padding: 20px 24px 50px 24px; }
            .hero-full { padding: 36px 32px; }
            .hero-full h1 { font-size: 42px; }
        }

        @media (max-width: 780px) {
            .stands-landscape-grid { grid-template-columns: 1fr; }
            .hero-full h1 { font-size: 34px; }
        }
    </style>
</head>
<body>
<div class="marketplace-full">
    <div class="hero-full">
        <div class="brand-chip"><i class="fas fa-crown"></i> CaFood Marketplace</div>
        <h1>Good Afternoon! 🌤️<br>Where do you want to eat?</h1>
        <p>Explore authentic food stalls, local favorites, and trending stands — free delivery across all vendors.</p>
        <div class="search-row">
            <i class="fas fa-search"></i>
            <input type="text" id="globalSearch" placeholder="Search stand or menu...">
            <button class="search-purple-btn" id="searchBtn">Discover</button>
        </div>
    </div>

    <div class="category-section">
        <div class="section-head">
            <h2><i class="fas fa-tag" style="color:#a855f7;"></i> Categories</h2>
        </div>
        <div class="category-pills" id="categoryList"></div>
    </div>

    <div class="section-head">
        <h2><i class="fas fa-store"></i> Popular Stands · Recommended for you</h2>
    </div>
    <div class="stands-landscape-grid" id="standsContainer"></div>

    <div class="footer">
        <i class="fas fa-motorcycle"></i> Free delivery on all stands · Real-time order · Purple marketplace
    </div>
</div>

<script>
    const standsData = [
        {
            id: 1, name: "Ramen House", description: "Authentic Japanese Ramen with rich Tonkotsu broth.",
            rating: 4.8, deliveryTime: "15-20 min", deliveryFee: "Free", category: "Noodles", isOpen: true,
            imageUrl: "https://images.unsplash.com/photo-1569718212165-3a8278d5f624?w=800&auto=format",
            menu: [
                { id: 101, name: "Tonkotsu Ramen", price: 45000, desc: "Pork bone broth with chashu" },
                { id: 102, name: "Shoyu Ramen", price: 40000, desc: "Soy sauce based broth" },
                { id: 103, name: "Gyoza (5 pcs)", price: 25000, desc: "Japanese dumplings" }
            ]
        },
        {
            id: 2, name: "Nusantara Rice Bowl", description: "Indonesian heritage rice bowls with sambal matah.",
            rating: 4.7, deliveryTime: "20-25 min", deliveryFee: "Free", category: "Rice", isOpen: true,
            imageUrl: "https://images.unsplash.com/photo-1633945274405-b6c8069047b0?w=800&auto=format",
            menu: [
                { id: 201, name: "Nasi Campur Bali", price: 38000, desc: "Mix rice with Balinese sides" },
                { id: 202, name: "Ayam Betutu Rice", price: 42000, desc: "Smoked chicken rice" },
                { id: 203, name: "Sambal Goreng Ati", price: 19000, desc: "Spicy liver sambal" }
            ]
        },
        {
            id: 3, name: "Kopi Kekinian", description: "Specialty coffee, cold brews, and artisanal drinks.",
            rating: 4.9, deliveryTime: "10-15 min", deliveryFee: "Free", category: "Drinks", isOpen: true,
            imageUrl: "https://images.unsplash.com/photo-1507133750040-4a8f57021571?w=800&auto=format",
            menu: [
                { id: 301, name: "Iced Caramel Latte", price: 32000, desc: "Smooth caramel latte" },
                { id: 302, name: "Matcha Espresso", price: 35000, desc: "Matcha + espresso shot" },
                { id: 303, name: "Vietnamese Drip", price: 30000, desc: "Strong Vietnamese coffee" }
            ]
        },
        {
            id: 4, name: "Sweet Tooth Lab", description: "Decadent cakes, traditional desserts, and sweet treats.",
            rating: 4.6, deliveryTime: "12-18 min", deliveryFee: "Free", category: "Dessert", isOpen: true,
            imageUrl: "https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=800&auto=format",
            menu: [
                { id: 401, name: "Lava Cake", price: 34000, desc: "Chocolate lava cake" },
                { id: 402, name: "Es Campur Istimewa", price: 24000, desc: "Mixed ice dessert" },
                { id: 403, name: "Bubur Sumsum", price: 18000, desc: "Rice flour porridge" }
            ]
        },
        {
            id: 5, name: "Burger District", description: "Juicy smashed burgers and crispy chicken sandwiches.",
            rating: 4.5, deliveryTime: "15-20 min", deliveryFee: "Free", category: "Fast Food", isOpen: true,
            imageUrl: "https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=800&auto=format",
            menu: [
                { id: 501, name: "Double Cheeseburger", price: 49000, desc: "Double beef patty" },
                { id: 502, name: "Spicy Chicken Sandwich", price: 42000, desc: "Crispy spicy chicken" },
                { id: 503, name: "Loaded Fries", price: 27000, desc: "Cheese + bacon fries" }
            ]
        }
    ];

    const allCategories = ["All", ...new Set(standsData.map(s => s.category))];
    let activeCategory = "All";
    let searchQuery = "";

    function formatRupiah(price) {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(price);
    }

    function getFilteredStands() {
        let filtered = [...standsData];
        if (activeCategory !== "All") {
            filtered = filtered.filter(stand => stand.category === activeCategory);
        }
        if (searchQuery.trim() !== "") {
            const lowerQuery = searchQuery.toLowerCase();
            filtered = filtered.filter(stand => {
                const matchStand = stand.name.toLowerCase().includes(lowerQuery);
                const matchMenu = stand.menu.some(menuItem => menuItem.name.toLowerCase().includes(lowerQuery));
                return matchStand || matchMenu;
            });
        }
        return filtered;
    }

    function renderCategories() {
        const container = document.getElementById("categoryList");
        if (!container) return;
        container.innerHTML = allCategories.map(cat => `
            <div class="cat-item ${activeCategory === cat ? 'active' : ''}" data-category="${cat}">${cat}</div>
        `).join("");
        document.querySelectorAll(".cat-item").forEach(el => {
            el.addEventListener("click", () => {
                activeCategory = el.getAttribute("data-category");
                const searchInputDom = document.getElementById("globalSearch");
                if (searchInputDom) searchInputDom.value = "";
                searchQuery = "";
                renderCategories();
                renderStands();
            });
        });
    }

    function renderStands() {
        const container = document.getElementById("standsContainer");
        if (!container) return;
        const filtered = getFilteredStands();

        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-utensils" style="font-size: 52px;"></i><h3>No food stands found</h3></div>`;
            return;
        }

        container.innerHTML = filtered.map(stand => {
            const menuHtml = stand.menu.map(item => `
                <div class="menu-item-row" onclick="goToDetailMenu(${stand.id}, ${item.id})">
                <span class="menu-name">${item.name}</span>
                <span class="menu-price">${formatRupiah(item.price)}</span>
            </div>
            `).join('');

            return `
                <div class="stand-card">
                    <img class="stand-img" src="${stand.imageUrl}" alt="${stand.name}" loading="lazy">
                    <div class="stand-content">
                        <div class="stand-header">
                            <h3 class="stand-name">${stand.name}</h3>
                            <div class="rating"><i class="fas fa-star" style="color: #fbbf24;"></i> ${stand.rating}</div>
                        </div>
                        <div class="desc">${stand.description}</div>
                        <div class="info-strip">
                            <span><i class="far fa-clock"></i> ${stand.deliveryTime}</span>
                            <span><i class="fas fa-motorcycle"></i> ${stand.deliveryFee}</span>
                            <span class="free-tag"><i class="fas fa-gem"></i> Free delivery</span>
                        </div>
                        <div class="menu-preview">
                            <div class="menu-label"><i class="fas fa-fire" style="color:#f97316;"></i> Popular Menu</div>
                            <div class="menu-list-compact">${menuHtml}</div>
                        </div>
                        <button class="btn-order" onclick="goToStand(${stand.id})">
                            <i class="fas fa-shopping-bag"></i> Order from ${stand.name.split(' ')[0]}
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }

    // Navigasi ke halaman detail menu dengan parameter standId dan menuId
    function goToDetailMenu(standId, menuId) {
        window.location.href = `detail-menu.html?standId=${standId}&menuId=${menuId}`;
    }


    function goToStand(standId) {
        // Arahkan ke menu pertama dari stand tersebut
        const stand = standsData.find(s => s.id === standId);
        if (stand && stand.menu.length > 0) {
            window.location.href = `detail-menu.html?standId=${standId}&menuId=${stand.menu[0].id}`;
        }
    }

    function performSearch() {
        const inputSearch = document.getElementById("globalSearch");
        if (inputSearch) {
            searchQuery = inputSearch.value.trim();
            activeCategory = "All";
            renderCategories();
            renderStands();
        }
    }

    function bindSearchEvents() {
        const searchBtn = document.getElementById("searchBtn");
        const searchField = document.getElementById("globalSearch");
        if (searchBtn) searchBtn.addEventListener("click", performSearch);
        if (searchField) searchField.addEventListener("keypress", (e) => { if (e.key === "Enter") performSearch(); });
    }

    function init() {
        renderCategories();
        renderStands();
        bindSearchEvents();
    }
    init();
</script>
</body>
</html>
