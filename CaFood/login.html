<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CaFood</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 25px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .login-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 35px 30px;
            text-align: center;
        }
        
        .login-logo {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }
        
        .login-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .login-subtitle {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .login-body {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .form-control.error {
            border-color: #f56565;
        }
        
        .error-message {
            color: #f56565;
            font-size: 0.75rem;
            margin-top: 5px;
            display: none;
        }
        
        .input-icon {
            position: relative;
        }
        
        .input-icon .form-control {
            padding-right: 45px;
        }
        
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            font-size: 1.1rem;
        }
        
        .role-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .role-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: 500;
        }
        
        .role-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
            color: white;
        }
        
        .forgot-link {
            text-align: right;
            margin-bottom: 25px;
        }
        
        .forgot-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.85rem;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .register-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            color: #666;
            font-size: 0.9rem;
        }
        
        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        
        .register-link a:hover {
            text-decoration: underline;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 1000;
            animation: slideDown 0.3s ease-out;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .toast.success {
            background: #48bb78;
        }
        
        .toast.error {
            background: #f56565;
        }
        
        @keyframes slideDown {
            from {
                transform: translateX(-50%) translateY(-100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
        
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">🍜</div>
            <div class="login-title">CaFood</div>
            <div class="login-subtitle">Welcome back! Please login to your account</div>
        </div>
        
        <div class="login-body">
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email" autocomplete="email">
                    <div class="error-message" id="emailError">Please enter a valid email address</div>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-icon">
                        <input type="password" class="form-control" id="password" placeholder="Enter your password" autocomplete="current-password">
                        <span class="toggle-password" onclick="togglePassword()">👁️</span>
                    </div>
                    <div class="error-message" id="passwordError">Please enter your password</div>
                </div>
                
                <div class="role-selector">
                    <div class="role-btn active" data-role="user">👤 User</div>
                    <div class="role-btn" data-role="stand">🏪 Stand</div>
                    <div class="role-btn" data-role="admin">👑 Admin</div>
                </div>
                
                <div class="forgot-link">
                    <a href="forgot-password.html">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn-login" id="loginBtn">Login</button>
            </form>
            
            <div class="register-link">
                Don't have an account? <a href="register.html" id="registerLink">Register here</a>
            </div>
        </div>
    </div>
    
    <script>
        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = '👁️';
            }
        }
        
        // Role selector
        let selectedRole = 'user';
        
        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedRole = this.dataset.role;
            });
        });
        
        // Show toast notification
        function showToast(message, type = 'success') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        // Validate form
        function validateForm() {
            let isValid = true;
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            // Email validation
            if (!email) {
                document.getElementById('emailError').style.display = 'block';
                document.getElementById('email').classList.add('error');
                isValid = false;
            } else if (!emailRegex.test(email)) {
                document.getElementById('emailError').textContent = 'Please enter a valid email address';
                document.getElementById('emailError').style.display = 'block';
                document.getElementById('email').classList.add('error');
                isValid = false;
            } else {
                document.getElementById('emailError').style.display = 'none';
                document.getElementById('email').classList.remove('error');
            }
            
            // Password validation
            if (!password) {
                document.getElementById('passwordError').style.display = 'block';
                document.getElementById('password').classList.add('error');
                isValid = false;
            } else {
                document.getElementById('passwordError').style.display = 'none';
                document.getElementById('password').classList.remove('error');
            }
            
            return isValid;
        }
        
        // Initialize demo users if not exist
        function initDemoUsers() {
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            
            if (users.length === 0) {
                users = [
                    {
                        id: 1,
                        fullName: "John Doe",
                        email: "john@example.com",
                        phone: "08123456789",
                        password: btoa("password123"),
                        role: "user",
                        isActive: true,
                        createdAt: new Date().toISOString()
                    },
                    {
                        id: 2,
                        fullName: "Ramen House Owner",
                        email: "ramen@cafood.com",
                        phone: "08123456780",
                        password: btoa("password123"),
                        role: "stand",
                        standName: "Ramen House",
                        isActive: true,
                        createdAt: new Date().toISOString()
                    },
                    {
                        id: 3,
                        fullName: "Administrator",
                        email: "admin@cafood.com",
                        phone: "08123456781",
                        password: btoa("password123"),
                        role: "admin",
                        isActive: true,
                        createdAt: new Date().toISOString()
                    }
                ];
                localStorage.setItem('users', JSON.stringify(users));
                
                // Also create stand entry for ramen house
                let stands = JSON.parse(localStorage.getItem('stands') || '[]');
                if (stands.length === 0) {
                    stands = [
                        {
                            id: 1,
                            userId: 2,
                            standName: "Ramen House",
                            logo: "🍜",
                            description: "Authentic Japanese Ramen with rich broth",
                            isOpen: true,
                            rating: 4.8,
                            createdAt: new Date().toISOString()
                        },
                        {
                            id: 2,
                            userId: null,
                            standName: "Nasi Campur Bali",
                            logo: "🍚",
                            description: "Traditional Balinese Cuisine",
                            isOpen: true,
                            rating: 4.9,
                            createdAt: new Date().toISOString()
                        },
                        {
                            id: 3,
                            userId: null,
                            standName: "Coffee & Co",
                            logo: "☕",
                            description: "Premium Coffee & Pastries",
                            isOpen: true,
                            rating: 4.7,
                            createdAt: new Date().toISOString()
                        }
                    ];
                    localStorage.setItem('stands', JSON.stringify(stands));
                }
            }
        }
        
        // Login handler
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            if (!validateForm()) {
                return;
            }
            
            const loginBtn = document.getElementById('loginBtn');
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
            loginBtn.disabled = true;
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            // Initialize demo users first time
            initDemoUsers();
            
            // Simulate network delay
            setTimeout(() => {
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const user = users.find(u => u.email === email && atob(u.password) === password);
                
                if (user && user.role === selectedRole) {
                    // Login success
                    const userData = {
                        id: user.id,
                        name: user.fullName,
                        email: user.email,
                        role: user.role,
                        standName: user.standName || null,
                        loginTime: new Date().toISOString()
                    };
                    localStorage.setItem('currentUser', JSON.stringify(userData));
                    
                    showToast(`Welcome back, ${user.fullName}!`, 'success');
                    
                    // Redirect based on role
                    setTimeout(() => {
                        switch(user.role) {
                            case 'user':
                                window.location.href = 'home.html';
                                break;
                            case 'stand':
                                window.location.href = 'dashboard-stand.html';
                                break;
                            case 'admin':
                                window.location.href = 'dashboard-admin.html';
                                break;
                            default:
                                window.location.href = 'home.html';
                        }
                    }, 1000);
                } else {
                    // Login failed
                    let errorMsg = 'Invalid email or password';
                    if (user && user.role !== selectedRole) {
                        errorMsg = `This account is registered as ${user.role}. Please select the correct role.`;
                    }
                    showToast(errorMsg, 'error');
                    loginBtn.innerHTML = originalText;
                    loginBtn.disabled = false;
                }
            }, 1000);
        });
        
        // Real-time validation
        document.getElementById('email').addEventListener('input', function() {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (this.value && !emailRegex.test(this.value)) {
                document.getElementById('emailError').textContent = 'Please enter a valid email address';
                document.getElementById('emailError').style.display = 'block';
                this.classList.add('error');
            } else {
                document.getElementById('emailError').style.display = 'none';
                this.classList.remove('error');
            }
        });
        
        document.getElementById('password').addEventListener('input', function() {
            if (this.value) {
                document.getElementById('passwordError').style.display = 'none';
                this.classList.remove('error');
            }
        });
        
        // Initialize on page load
        initDemoUsers();
    </script>
</body>
</html>
