<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaFood • Status Pesanan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f0ff;
            padding-bottom: 40px;
        }
        
        .header {
            background: white;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #f0eaff;
        }
        
        .header-content {
            display: flex;
            align-items: center;
            gap: 16px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .back-btn {
            width: 40px;
            height: 40px;
            background: #f5f3ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .header-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1e1a3a;
        }
        
        .status-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Queue Card */
        .queue-card {
            background: linear-gradient(135deg, #6d28d9, #a855f7);
            border-radius: 32px;
            padding: 32px;
            text-align: center;
            color: white;
            margin-bottom: 24px;
        }
        
        .queue-label {
            font-size: 0.8rem;
            opacity: 0.8;
            letter-spacing: 2px;
        }
        
        .queue-number {
            font-size: 4rem;
            font-weight: 800;
            margin: 12px 0;
            letter-spacing: 4px;
        }
        
        .order-number {
            font-size: 0.75rem;
            opacity: 0.7;
        }
        
        /* Status Timeline */
        .timeline-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .timeline {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin: 20px 0;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            top: 30px;
            left: 50px;
            right: 50px;
            height: 3px;
            background: #e2d9ff;
            transform: translateY(-50%);
            z-index: 0;
        }
        
        .timeline-step {
            text-align: center;
            flex: 1;
            position: relative;
            z-index: 1;
        }
        
        .step-icon {
            width: 60px;
            height: 60px;
            background: #f5f3ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 1.5rem;
            transition: all 0.3s;
            border: 3px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .timeline-step.completed .step-icon {
            background: linear-gradient(135deg, #6d28d9, #a855f7);
            color: white;
        }
        
        .timeline-step.active .step-icon {
            background: linear-gradient(135deg, #6d28d9, #a855f7);
            color: white;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(109,40,217,0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(109,40,217,0); }
        }
        
        .step-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #1e1a3a;
        }
        
        .step-time {
            font-size: 0.65rem;
            color: #7b6cb0;
            margin-top: 4px;
        }
        
        .timeline-step.completed .step-label,
        .timeline-step.active .step-label {
            color: #6d28d9;
        }
        
        /* Estimated Time */
        .estimated-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            margin-bottom: 24px;
        }
        
        .estimated-label {
            font-size: 0.8rem;
            color: #7b6cb0;
            margin-bottom: 8px;
        }
        
        .estimated-value {
            font-size: 2rem;
            font-weight: 800;
            color: #6d28d9;
        }
        
        .estimated-unit {
            font-size: 0.9rem;
            color: #7b6cb0;
        }
        
        /* Order Details */
        .details-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .details-title {
            font-weight: 700;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0eaff;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }
        
        .detail-label {
            color: #7b6cb0;
        }
        
        .detail-value {
            font-weight: 500;
            color: #1e1a3a;
        }
        
        .items-list {
            margin-top: 12px;
        }
        
        .items-list .detail-row {
            padding: 6px 0;
            border-bottom: 1px dashed #f0eaff;
        }
        
        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
        }
        
        .btn-primary {
            flex: 1;
            padding: 14px;
            background: linear-gradient(135deg, #6d28d9, #a855f7);
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-outline {
            flex: 1;
            padding: 14px;
            background: white;
            color: #6d28d9;
            border: 1px solid #6d28d9;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }
        
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #6d28d9, #a855f7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(109,40,217,0.3);
            z-index: 100;
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1a3a;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        @media (max-width: 768px) {
            .status-container { padding: 16px; }
            .timeline::before { left: 30px; right: 30px; }
            .step-icon { width: 50px; height: 50px; font-size: 1.2rem; }
            .step-label { font-size: 0.6rem; }
            .queue-number { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="back-btn" onclick="window.location.href='menu-stand.html'">
                <i class="fas fa-home"></i>
            </div>
            <div class="header-title">📦 Order Status</div>
        </div>
    </div>
    
    <div class="status-container" id="statusContainer">
        <!-- Status content will be loaded here -->
    </div>
    
    <div class="refresh-btn" onclick="refreshStatus()">
        <i class="fas fa-sync-alt"></i>
    </div>
    
    <script>
        let currentOrder = null;
        
        // Status steps definition
        const statusSteps = [
            { id: 'pending', label: 'Menunggu Konfirmasi', icon: '🕐' },
            { id: 'confirmed', label: 'Dikonfirmasi', icon: '✅' },
            { id: 'processing', label: 'Diproses', icon: '🍳' },
            { id: 'ready', label: 'Siap Diambil', icon: '🛎️' },
            { id: 'completed', label: 'Selesai', icon: '🎉' }
        ];
        
        function formatRupiah(price) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(price);
        }
        
        function formatTime(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        }
        
        function loadStatus() {
            // Try to get current order from localStorage
            currentOrder = JSON.parse(localStorage.getItem('currentOrder') || 'null');
            
            // If no current order, try to get the latest order
            if (!currentOrder) {
                const orders = JSON.parse(localStorage.getItem('orders') || '[]');
                if (orders.length > 0) {
                    currentOrder = orders[orders.length - 1];
                    localStorage.setItem('currentOrder', JSON.stringify(currentOrder));
                }
            }
            
            if (!currentOrder) {
                document.getElementById('statusContainer').innerHTML = `
                    <div class="timeline-card" style="text-align:center; padding:60px 20px;">
                        <i class="fas fa-receipt" style="font-size: 4rem; color: #c4b5fd; margin-bottom: 16px;"></i>
                        <h3>No Active Order</h3>
                        <p style="color:#7b6cb0; margin-top:8px;">You don't have any active orders</p>
                        <a href="menu-stand.html" class="btn-primary" style="display:inline-block; margin-top:24px; padding:12px 32px;">Browse Food</a>
                    </div>
                `;
                return;
            }
            
            renderStatus();
        }
        
        function getCurrentStepIndex() {
            const status = currentOrder.status;
            const index = statusSteps.findIndex(step => step.id === status);
            return index !== -1 ? index : 0;
        }
        
        function renderStatus() {
            const container = document.getElementById('statusContainer');
            const currentStepIndex = getCurrentStepIndex();
            
            // Format estimated time display
            let estimatedDisplay = '';
            if (currentOrder.status === 'pending') {
                estimatedDisplay = `${currentOrder.estimatedTime} menit`;
            } else if (currentOrder.status === 'confirmed') {
                estimatedDisplay = `${Math.max(5, currentOrder.estimatedTime - 5)} menit`;
            } else if (currentOrder.status === 'processing') {
                estimatedDisplay = `${Math.max(2, Math.floor(currentOrder.estimatedTime / 2))} menit`;
            } else if (currentOrder.status === 'ready') {
                estimatedDisplay = 'Siap diambil!';
            } else {
                estimatedDisplay = 'Selesai';
            }
            
            container.innerHTML = `
                <!-- Queue Card -->
                <div class="queue-card">
                    <div class="queue-label">NOMOR ANTREAN ANDA</div>
                    <div class="queue-number">#${currentOrder.queueNumber}</div>
                    <div class="order-number">${currentOrder.orderNumber}</div>
                </div>
                
                <!-- Timeline Status -->
                <div class="timeline-card">
                    <div class="timeline">
                        ${statusSteps.map((step, index) => `
                            <div class="timeline-step ${index <= currentStepIndex ? 'completed' : ''} ${index === currentStepIndex ? 'active' : ''}">
                                <div class="step-icon">${step.icon}</div>
                                <div class="step-label">${step.label}</div>
                                ${index === currentStepIndex && currentOrder.updatedAt ? `<div class="step-time">${formatTime(currentOrder.updatedAt)}</div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <!-- Estimated Time -->
                <div class="estimated-card">
                    <div class="estimated-label">
                        <i class="fas fa-hourglass-half"></i> Estimasi Waktu
                    </div>
                    <div class="estimated-value">
                        ${currentOrder.status === 'ready' ? '🛎️' : currentOrder.status === 'completed' ? '✅' : '⏱️'} ${estimatedDisplay}
                    </div>
                    ${currentOrder.status === 'pending' ? '<div style="font-size:0.7rem; color:#7b6cb0; margin-top:8px;">Mohon tunggu konfirmasi dari stand</div>' : ''}
                    ${currentOrder.status === 'ready' ? '<div style="font-size:0.7rem; color:#10b981; margin-top:8px;">Pesanan Anda sudah siap! Silakan ambil di counter</div>' : ''}
                </div>
                
                <!-- Order Details -->
                <div class="details-card">
                    <div class="details-title">Detail Pesanan</div>
                    <div class="detail-row">
                        <span class="detail-label">Stand</span>
                        <span class="detail-value">${currentOrder.standName}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Nama</span>
                        <span class="detail-value">${currentOrder.customerName}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">No. Meja</span>
                        <span class="detail-value">${currentOrder.tableNumber || '-'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Metode Pembayaran</span>
                        <span class="detail-value">${currentOrder.paymentMethod === 'cash' ? 'Tunai' : currentOrder.paymentMethod === 'qris' ? 'QRIS' : currentOrder.paymentMethod === 'card' ? 'Kartu' : 'Transfer Bank'}</span>
                    </div>
                    <div class="details-title" style="margin-top: 16px;">Item Pesanan</div>
                    <div class="items-list">
                        ${currentOrder.items.map(item => `
                            <div class="detail-row">
                                <span class="detail-label">${item.quantity}x ${item.name}</span>
                                <span class="detail-value">${formatRupiah(item.price * item.quantity)}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="detail-row" style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0eaff;">
                        <span class="detail-label">Subtotal</span>
                        <span class="detail-value">${formatRupiah(currentOrder.subtotal)}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Biaya Antar</span>
                        <span class="detail-value">${formatRupiah(currentOrder.deliveryFee)}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Pajak (5%)</span>
                        <span class="detail-value">${formatRupiah(currentOrder.tax)}</span>
                    </div>
                    <div class="detail-row" style="font-weight: 800;">
                        <span class="detail-label">Total</span>
                        <span class="detail-value">${formatRupiah(currentOrder.total)}</span>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <a href="menu-stand.html?id=${currentOrder.standId}" class="btn-outline">
                        <i class="fas fa-store"></i> Pesan Lagi
                    </a>
                    ${currentOrder.status === 'ready' || currentOrder.status === 'completed' ? 
                        `<button class="btn-primary" onclick="window.location.href='menu-stand.html'">
                            <i class="fas fa-menu-stand"></i> Kembali ke menu-stand
                        </button>` : 
                        `<button class="btn-primary" onclick="refreshStatus()">
                            <i class="fas fa-sync-alt"></i> Refresh Status
                        </button>`
                    }
                </div>
            `;
        }
        
        function refreshStatus() {
            // Simulate status update (in real app, this would call API)
            // For demo, we'll check if we can update status
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const updatedOrder = orders.find(o => o.orderNumber === currentOrder?.orderNumber);
            
            if (updatedOrder && updatedOrder.status !== currentOrder?.status) {
                currentOrder = updatedOrder;
                localStorage.setItem('currentOrder', JSON.stringify(currentOrder));
                showToast(`Status berubah: ${getStatusText(currentOrder.status)}`);
                renderStatus();
            } else {
                showToast('Status masih sama, coba lagi nanti');
            }
        }
        
        function getStatusText(status) {
            const step = statusSteps.find(s => s.id === status);
            return step ? step.label : status;
        }
        
        function showToast(message) {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        // Auto refresh every 10 seconds
        let refreshInterval;
        
        function startAutoRefresh() {
            refreshInterval = setInterval(() => {
                const orders = JSON.parse(localStorage.getItem('orders') || '[]');
                const updatedOrder = orders.find(o => o.orderNumber === currentOrder?.orderNumber);
                if (updatedOrder && updatedOrder.status !== currentOrder?.status) {
                    currentOrder = updatedOrder;
                    localStorage.setItem('currentOrder', JSON.stringify(currentOrder));
                    renderStatus();
                }
            }, 10000);
        }
        
        loadStatus();
        startAutoRefresh();
    </script>
</body>
</html>
