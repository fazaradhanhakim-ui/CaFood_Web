<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CaFood</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .register-container {
            background: white;
            border-radius: 25px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .register-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .register-logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        
        .register-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .register-subtitle {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .register-body {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .form-group label .required {
            color: #f56565;
            margin-left: 3px;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .form-control.error {
            border-color: #f56565;
        }
        
        .error-message {
            color: #f56565;
            font-size: 0.75rem;
            margin-top: 5px;
            display: none;
        }
        
        .input-icon {
            position: relative;
        }
        
        .input-icon .form-control {
            padding-right: 45px;
        }
        
        .input-icon .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            font-size: 1.1rem;
        }
        
        /* Role Selector */
        .role-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .role-option {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .role-option.selected {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
            color: white;
        }
        
        .role-icon {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        
        .role-name {
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .role-desc {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 3px;
        }
        
        /* Password Strength */
        .password-strength {
            margin-top: 8px;
        }
        
        .strength-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 5px;
        }
        
        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
        }
        
        .strength-text {
            font-size: 0.7rem;
            color: #999;
        }
        
        /* Terms Checkbox */
        .terms-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .terms-group input {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            cursor: pointer;
        }
        
        .terms-group label {
            font-size: 0.85rem;
            color: #666;
            cursor: pointer;
        }
        
        .terms-group a {
            color: #667eea;
            text-decoration: none;
        }
        
        /* Buttons */
        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        
        .btn-register:active {
            transform: translateY(0);
        }
        
        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            color: #666;
        }
        
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 1000;
            animation: slideDown 0.3s ease-out;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .toast.success {
            background: #48bb78;
        }
        
        .toast.error {
            background: #f56565;
        }
        
        @keyframes slideDown {
            from {
                transform: translateX(-50%) translateY(-100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
        
        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            .register-body {
                padding: 20px;
            }
            
            .role-option {
                padding: 8px;
            }
            
            .role-icon {
                font-size: 1.2rem;
            }
            
            .role-name {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <div class="register-logo">🍜</div>
            <div class="register-title">Join CaFood</div>
            <div class="register-subtitle">Create your account to start ordering</div>
        </div>
        
        <div class="register-body">
            <form id="registerForm">
                <!-- Role Selection -->
                <div class="role-selector">
                    <div class="role-option selected" data-role="user">
                        <div class="role-icon">👤</div>
                        <div class="role-name">Customer</div>
                        <div class="role-desc">Order food</div>
                    </div>
                    <div class="role-option" data-role="stand">
                        <div class="role-icon">🏪</div>
                        <div class="role-name">Stand Owner</div>
                        <div class="role-desc">Sell your food</div>
                    </div>
                </div>
                
                <!-- Full Name -->
                <div class="form-group">
                    <label>Full Name <span class="required">*</span></label>
                    <input type="text" class="form-control" id="fullName" placeholder="Enter your full name">
                    <div class="error-message" id="nameError">Please enter your full name</div>
                </div>
                
                <!-- Email -->
                <div class="form-group">
                    <label>Email Address <span class="required">*</span></label>
                    <input type="email" class="form-control" id="email" placeholder="you@example.com">
                    <div class="error-message" id="emailError">Please enter a valid email address</div>
                </div>
                
                <!-- Phone Number -->
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" class="form-control" id="phone" placeholder="0812-3456-7890">
                </div>
                
                <!-- Password -->
                <div class="form-group">
                    <label>Password <span class="required">*</span></label>
                    <div class="input-icon">
                        <input type="password" class="form-control" id="password" placeholder="Create a password">
                        <span class="toggle-password" onclick="togglePassword('password')">👁️</span>
                    </div>
                    <div class="password-strength" id="passwordStrength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <div class="strength-text" id="strengthText"></div>
                    </div>
                    <div class="error-message" id="passwordError">Password must be at least 6 characters</div>
                </div>
                
                <!-- Confirm Password -->
                <div class="form-group">
                    <label>Confirm Password <span class="required">*</span></label>
                    <div class="input-icon">
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm your password">
                        <span class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</span>
                    </div>
                    <div class="error-message" id="confirmError">Passwords do not match</div>
                </div>
                
                <!-- Stand Name (only for stand owner) -->
                <div class="form-group" id="standNameGroup" style="display: none;">
                    <label>Stand Name <span class="required">*</span></label>
                    <input type="text" class="form-control" id="standName" placeholder="Enter your stand name">
                    <div class="error-message" id="standNameError">Please enter your stand name</div>
                </div>
                
                <!-- Terms & Conditions -->
                <div class="terms-group">
                    <input type="checkbox" id="termsCheckbox">
                    <label for="termsCheckbox">
                        I agree to the <a href="#" onclick="return false;">Terms of Service</a> and 
                        <a href="#" onclick="return false;">Privacy Policy</a>
                    </label>
                </div>
                
                <button type="submit" class="btn-register" id="registerBtn">Create Account</button>
            </form>
            
            <div class="login-link">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>
    
    <script>
        // Role selection
        let selectedRole = 'user';
        
        document.querySelectorAll('.role-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.role-option').forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                selectedRole = this.dataset.role;
                
                // Show/hide stand name field
                const standNameGroup = document.getElementById('standNameGroup');
                if (selectedRole === 'stand') {
                    standNameGroup.style.display = 'block';
                } else {
                    standNameGroup.style.display = 'none';
                }
            });
        });
        
        // Toggle password visibility
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            if (field.type === 'password') {
                field.type = 'text';
            } else {
                field.type = 'password';
            }
        }
        
        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            let message = '';
            let color = '';
            
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            if (password.length === 0) {
                message = '';
                color = '#e0e0e0';
                strengthFill.style.width = '0%';
            } else if (strength <= 1) {
                message = 'Weak password';
                color = '#f56565';
                strengthFill.style.width = '25%';
            } else if (strength <= 3) {
                message = 'Fair password';
                color = '#ed8936';
                strengthFill.style.width = '50%';
            } else if (strength <= 4) {
                message = 'Good password';
                color = '#48bb78';
                strengthFill.style.width = '75%';
            } else {
                message = 'Strong password!';
                color = '#38a169';
                strengthFill.style.width = '100%';
            }
            
            strengthFill.style.backgroundColor = color;
            strengthText.textContent = message;
            strengthText.style.color = color;
        });
        
        // Form validation
        function validateForm() {
            let isValid = true;
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const termsChecked = document.getElementById('termsCheckbox').checked;
            
            // Name validation
            if (!fullName) {
                showError('nameError', true);
                document.getElementById('fullName').classList.add('error');
                isValid = false;
            } else {
                showError('nameError', false);
                document.getElementById('fullName').classList.remove('error');
            }
            
            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !emailRegex.test(email)) {
                showError('emailError', true);
                document.getElementById('email').classList.add('error');
                isValid = false;
            } else {
                showError('emailError', false);
                document.getElementById('email').classList.remove('error');
            }
            
            // Password validation
            if (!password || password.length < 6) {
                showError('passwordError', true);
                document.getElementById('password').classList.add('error');
                isValid = false;
            } else {
                showError('passwordError', false);
                document.getElementById('password').classList.remove('error');
            }
            
            // Confirm password validation
            if (password !== confirmPassword) {
                showError('confirmError', true);
                document.getElementById('confirmPassword').classList.add('error');
                isValid = false;
            } else {
                showError('confirmError', false);
                document.getElementById('confirmPassword').classList.remove('error');
            }
            
            // Stand name validation for stand owner
            if (selectedRole === 'stand') {
                const standName = document.getElementById('standName').value.trim();
                if (!standName) {
                    showError('standNameError', true);
                    document.getElementById('standName').classList.add('error');
                    isValid = false;
                } else {
                    showError('standNameError', false);
                    document.getElementById('standName').classList.remove('error');
                }
            }
            
            // Terms validation
            if (!termsChecked) {
                showToast('Please agree to the Terms and Conditions', 'error');
                isValid = false;
            }
            
            return isValid;
        }
        
        function showError(errorId, show) {
            const errorElement = document.getElementById(errorId);
            if (errorElement) {
                errorElement.style.display = show ? 'block' : 'none';
            }
        }
        
        function showToast(message, type = 'success') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        // Register form submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!validateForm()) {
                return;
            }
            
            const registerBtn = document.getElementById('registerBtn');
            const originalText = registerBtn.innerHTML;
            registerBtn.innerHTML = '<span class="spinner"></span> Creating account...';
            registerBtn.disabled = true;
            
            // Simulate API call
            setTimeout(() => {
                const fullName = document.getElementById('fullName').value.trim();
                const email = document.getElementById('email').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const password = document.getElementById('password').value;
                const standName = document.getElementById('standName')?.value.trim() || '';
                
                // Get existing users from localStorage
                let users = JSON.parse(localStorage.getItem('users') || '[]');
                
                // Check if email already exists
                if (users.some(u => u.email === email)) {
                    showToast('Email already registered! Please use another email.', 'error');
                    registerBtn.innerHTML = originalText;
                    registerBtn.disabled = false;
                    return;
                }
                
                // Create new user
                const newUser = {
                    id: Date.now(),
                    fullName: fullName,
                    email: email,
                    phone: phone,
                    password: btoa(password), // Simple encoding (in real app, use proper hashing)
                    role: selectedRole,
                    standName: standName,
                    createdAt: new Date().toISOString(),
                    isActive: true
                };
                
                users.push(newUser);
                localStorage.setItem('users', JSON.stringify(users));
                
                // If stand owner, also create stand entry
                if (selectedRole === 'stand') {
                    let stands = JSON.parse(localStorage.getItem('stands') || '[]');
                    const newStand = {
                        id: Date.now(),
                        userId: newUser.id,
                        standName: standName,
                        logo: "🏪",
                        description: "New stand on CaFood",
                        isOpen: true,
                        rating: 0,
                        createdAt: new Date().toISOString()
                    };
                    stands.push(newStand);
                    localStorage.setItem('stands', JSON.stringify(stands));
                }
                
                showToast('Account created successfully! Redirecting to login...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                
            }, 1500);
        });
        
        // Real-time validation
        document.getElementById('confirmPassword').addEventListener('input', function() {
            const password = document.getElementById('password').value;
            if (this.value && this.value !== password) {
                showError('confirmError', true);
                this.classList.add('error');
            } else {
                showError('confirmError', false);
                this.classList.remove('error');
            }
        });
        
        document.getElementById('email').addEventListener('input', function() {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (this.value && !emailRegex.test(this.value)) {
                showError('emailError', true);
                this.classList.add('error');
            } else {
                showError('emailError', false);
                this.classList.remove('error');
            }
        });
    </script>
</body>
</html>
